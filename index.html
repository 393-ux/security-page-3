<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ Output Page</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            text-align: center;
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
        }
        h1 { font-size: 1.8rem; margin-bottom: 10px; color: #ffffff; }
        .console {
            background-color: #000000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            width: 100%;
            max-width: 450px;
            margin: 20px auto;
            border-radius: 12px;
            text-align: left;
            direction: ltr;
            box-shadow: 0px 8px 24px rgba(0, 255, 0, 0.15);
            border: 1px solid #00ff0033;
        }
        .video-container {
            width: 100%;
            margin-bottom: 15px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
            background: #050505;
        }
        video { width: 100%; display: block; }
        .arabic-text {
            direction: rtl;
            text-align: right;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin-top: 12px;
            font-size: 1.2rem;
        }
        .btn-main {
            background-color: #25d366;
            color: white;
            border: none;
            padding: 15px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            max-width: 450px;
            margin: 10px auto;
            box-shadow: 0 4px 12px rgba(37,211,102,0.3);
            transition: 0.2s;
        }
        .btn-share {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            max-width: 450px;
            margin: 5px auto;
            box-shadow: 0 4px 12px rgba(0,123,255,0.3);
        }
        .alert-box { display: none; color: #00ff00; margin-top: 15px; font-weight: bold; }
        #yt-player { display: none; }
    </style>
</head>
<body>

    <h1>C++ Console Output</h1>
    
    <button class="btn-main" id="start-btn" onclick="initializePage()">تشغيل الصفحة والدخول ⚡</button>

    <div class="console">
        <div class="video-container">
            <video id="my-video" src="video.mp4" controls loop playsinline></video>
        </div>
        <p style="margin: 0;">dont play with us</p>
        <p class="arabic-text" style="margin: 0;">بدء عمليات المقاومة الفستكية</p>
    </div>

    <div id="yt-player"></div>

    <button class="btn-share" onclick="sharePage()">مشاركة الرابط 🔗</button>
    <div id="alert" class="alert-box">✓ تم نسخ رابط الصفحة بنجاح!</div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;
        const video = document.getElementById("my-video");
        const startBtn = document.getElementById("start-btn");

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0',
                width: '0',
                videoId: 'X8lSpjmNWCA',
                playerVars: {
                    'autoplay': 0,
                    'loop': 1,
                    'playlist': 'X8lSpjmNWCA'
                }
            });
        }

        function initializePage() {
            if (player && typeof player.playVideo === 'function') {
                player.playVideo();
            }
            video.play().catch(e => console.log("Video playback managed"));
            startBtn.style.display = "none";
        }

        video.onplay = function() {
            if (player && typeof player.pauseVideo === 'function') {
                player.pauseVideo();
            }
        };

        video.onpause = function() {
            if (player && typeof player.playVideo === 'function') {
                player.playVideo();
            }
        };

        async function sharePage() {
            const shareData = {
                title: 'المقاومة الفستكية',
                text: 'dont play with us - C++ Run',
                url: window.location.href
            };
            if (navigator.share) {
                try { await navigator.share(shareData); } catch (err) {}
            } else {
                try {
                    await navigator.clipboard.writeText(window.location.href);
                    showAlert();
                } catch (err) {
                    const tempInput = document.createElement("input");
                    tempInput.value = window.location.href;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand("copy");
                    document.body.removeChild(tempInput);
                    showAlert();
                }
            }
        }

        function showAlert() {
            const alertBox = document.getElementById("alert");
            alertBox.style.display = "block";
            setTimeout(() => { alertBox.style.display = "none"; }, 3000);
        }
    </script>

</body>
</html>
